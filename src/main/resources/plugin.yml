name: GrzybcioRynek
version: 1.0.0
main: com.example.marketplace.MarketPlace
api-version: '1.21'
softdepend: [Vault, Nexo, Oraxen]
author: Grzybcio

commands:
  market:
    description: Główne polecenie rynku
    aliases: [ah, rynek]
    usage: |
      /<command> - Otwórz rynek (GUI)
      /<command> sell <cena> - Wystaw przedmiot
      /<command> remove <id> - Usuń ofertę
      /<command> reload - Przeładuj konfigurację
  wystaw:
    description: Wystaw przedmiot z ręki na rynek
    usage: /<command> <cena>
  aukcje:
    description: Przeglądaj rynek
    aliases: [rynek-gui, ah-gui]
    usage: /<command>

permissions:
  market.use:
    description: Pozwala używać podstawowych funkcji rynku
    default: true
  market.sell:
    description: Pozwala wystawiać przedmioty na sprzedaż
    default: true
  market.reload:
    description: Pozwala przeładować konfigurację
    default: op
  market.admin:
    description: Pozwala usuwać cudze oferty
    default: op
